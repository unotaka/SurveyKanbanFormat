name: Gemini Full Auto Developer

on:
  workflow_dispatch: # GitHubのウェブ画面から1クリックで手動実行を可能にします
  # もし1時間ごとにNotionを監視させたい場合は、以下のコメントアウトを外して有効化してください
  # schedule:
  #   - cron: '0 * * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  full-auto-dev:
    runs-on: ubuntu-latest

    steps:
    # 1. リポジトリのソースコードを取得（チェックアウト）
    - name: Checkout Repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0 # すべてのブランチ履歴を取得します

    # 2. Notion APIの実行、Gemini APIによるコード生成、Notionの更新
    - name: Run Auto Generation and Move Kanban
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        echo "=== 1. Notionデータベースから『Claude生成待ち』のタスクを検索中 ==="
        NOTION_RES=$(curl -s -X POST "https://api.notion.com/v1/databases/${NOTION_DATABASE_ID}/query" \
          -H "Authorization: Bearer ${NOTION_TOKEN}" \
          -H "Notion-Version: 2022-06-28" \
          -H "Content-Type: application/json" \
          -d '{
            "filter": {
              "property": "ステータス",
              "status": {
                "equals": "Claude生成待ち"
              }
            }
          }')

        # デバッグ
        echo "=== デバッグ: Notion APIからの生の応答 ===" && echo "$NOTION_RES"

        # 該当する最初のタスクのページIDを取得
        PAGE_ID=$(echo "$NOTION_RES" | jq -r '.results[0].id // empty')
        
        if [ -z "$PAGE_ID" ] || [ "$PAGE_ID" = "null" ]; then
          echo "「Claude生成待ち」のタスクは見つかりませんでした。処理を終了します。"
          exit 0
        fi

        # タスク名（要件）を抽出
        TASK_TITLE=$(echo "$NOTION_RES" | jq -r '.results[0].properties["名前"].title[0].text.content')
        echo "対象タスク: $TASK_TITLE"

        # Notionの「仕様・要件」プロパティ（リッチテキスト）を取得
        REQUIREMENTS=$(echo "$NOTION_RES" | jq -r '.results[0].properties["仕様・要件"].rich_text[0].text.content // empty')
        echo "=== 取得した仕様・要件 ==="
        echo "$REQUIREMENTS"

        echo "=== 2. パッケージ名とクラス名の抽出中 ==="
        # 「仕様・要件」テキストから「パッケージ」を検索して抽出 (例: パッケージ：sample -> sample)
        PKG_NAME=$(echo "$REQUIREMENTS" | grep -E 'パッケージ[：:]' | sed -E 's/.*パッケージ[：:][[:space:]]*([a-zA-Z0-9._]+).*/\1/' | head -n 1)
        
        # 「仕様・要件」テキストから「クラス名」を検索して抽出 (例: クラス名: UserRegistrationDto -> UserRegistrationDto)
        CLASS_NAME=$(echo "$REQUIREMENTS" | grep -E 'クラス名[：:]' | sed -E 's/.*クラス名[：:][[:space:]]*([a-zA-Z0-9._]+).*/\1/' | head -n 1)

        echo "抽出されたパッケージ名: $PKG_NAME"
        echo "抽出されたクラス名: $CLASS_NAME"

        echo "=== 3. Gemini API（無料枠）にリクエストしてJavaコードを作成中 ==="
        # プロンプトの構築（複数ファイル出力に対応させるための指示を追加）
        PROMPT="以下の要件に基づき、Javaのソースコードを出力してください。要件を満たすために複数のクラス、インターフェース、例外、DTOなどが必要な場合は、それらをすべて出力してください。"
        
        if [ -n "$PKG_NAME" ]; then
          PROMPT="${PROMPT}\\n- 指定デフォルトパッケージ名: $PKG_NAME"
        fi
        if [ -n "$CLASS_NAME" ]; then
          PROMPT="${PROMPT}\\n- メインとなる指定クラス名: $CLASS_NAME"
        fi

        PROMPT="${PROMPT}\\n\\n【タスク内容】\\n$TASK_TITLE\\n\\n【詳細な仕様・要件】\\n$REQUIREMENTS"
        PROMPT="${PROMPT}\\n\\n※【重要・出力フォーマットの厳守】"
        PROMPT="${PROMPT}\\n複数のファイルを出力する場合は、後からスクリプトで分割できるように、必ず以下の形式でファイルごとに区切って出力してください。解説文や挨拶は一切含めないでください。"
        PROMPT="${PROMPT}\\n"
        PROMPT="${PROMPT}\\n--- FILE: src/main/java/path/to/ClassName.java ---"
        PROMPT="${PROMPT}\\npackage path.to;"
        PROMPT="${PROMPT}\\npublic class ClassName {"
        PROMPT="${PROMPT}\\n    ... "
        PROMPT="${PROMPT}\\n}"
        PROMPT="${PROMPT}\\n--- END FILE ---"
        PROMPT="${PROMPT}\\n"
        PROMPT="${PROMPT}\\n1つのファイルしかない場合でも、必ず上記の \`--- FILE: パス ---\` と \`--- END FILE ---\` の行で囲んで出力してください。"

        PAYLOAD=$(jq -n \
          --arg prompt "$PROMPT" \
          '{
            contents: [{parts: [{text: $prompt}]}]
          }')

        GEMINI_RES=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
          -H "Content-Type: application/json" \
          -d "$PAYLOAD")

        # 生成コードの解析
        JAVA_CODE=$(echo "$GEMINI_RES" | jq -r '.candidates[0].content.parts[0].text // empty')

        if [ -z "$JAVA_CODE" ] || [ "$JAVA_CODE" = "null" ]; then
          echo "Gemini APIからのレスポンス解析に失敗しました。APIキーまたは上限設定を確認してください。APIレスポンス:"
          echo "$GEMINI_RES"
          exit 1
        fi

        echo "=== 4. 複数ファイルの解析と書き出し ==="
        # プロンプトの指定形式に従ってファイルを切り出す
        echo "$JAVA_CODE" | awk '
          /^--- FILE: .* ---$/ {
            match($0, /--- FILE: (.*) ---/, arr);
            filepath = arr[1];
            
            dirpath = filepath;
            sub(/\/[^\/]+$/, "", dirpath);
            system("mkdir -p \"" dirpath "\"");
            
            print "書き出し中: " filepath;
            is_writing = 1;
            next;
          }
          /^--- END FILE ---$/ {
            is_writing = 0;
            close(filepath);
            next;
          }
          {
            if (is_writing) {
              print $0 > filepath;
            }
          }
        '

        # 万が一、Geminiが指定フォーマットを無視して生コードを直出ししてきた場合のフォールバック
        if [ ! -d "src/main/java" ] || [ -z "$(find src/main/java -name '*.java' 2>/dev/null)" ]; then
          echo "警告: 指定フォーマットでのパースに失敗したか、ファイルが生成されませんでした。単一ファイルとしてフォールバック処理を行います。"
          
          if [ -n "$PKG_NAME" ]; then
            DIR_PATH="src/main/java/$(echo "$PKG_NAME" | tr '.' '/')"
          else
            CODE_PKG=$(echo "$JAVA_CODE" | grep -E '^[[:space:]]*package[[:space:]]+' | sed -E 's/^[[:space:]]*package[[:space:]]+([^;[:space:]]+);.*/\1/' | head -n 1)
            if [ -n "$CODE_PKG" ]; then
              DIR_PATH="src/main/java/$(echo "$CODE_PKG" | tr '.' '/')"
            else
              DIR_PATH="src/main/java"
            fi
          fi

          if [ -n "$CLASS_NAME" ]; then
            FILE_NAME="${CLASS_NAME}.java"
          else
            CODE_CLASS=$(echo "$JAVA_CODE" | grep -E 'public[[:space:]]+(class|interface|enum|record)[[:space:]]+' | sed -E 's/.*public[[:space:]]+(class|interface|enum|record)[[:space:]]+([^{[:space:]]+).*/\2/' | head -n 1)
            if [ -n "$CODE_CLASS" ]; then
              FILE_NAME="${CODE_CLASS}.java"
            else
              FILE_NAME="GeneratedService.java"
            fi
          fi

          mkdir -p "$DIR_PATH"
          echo "$JAVA_CODE" > "${DIR_PATH}/${FILE_NAME}"
          echo "フォールバックで保存しました: ${DIR_PATH}/${FILE_NAME}"
        fi

        echo "=== 5. Notionのかんばんボードを『Git格納済み』に移動中 ==="
        curl -s -X PATCH "https://api.notion.com/v1/pages/${PAGE_ID}" \
          -H "Authorization: Bearer ${NOTION_TOKEN}" \
          -H "Notion-Version: 2022-06-28" \
          -H "Content-Type: application/json" \
          -d '{
            "properties": {
              "ステータス": {
                "status": {
                  "name": "Git格納済み"
                }
              }
            }
          }' > /dev/null
        echo "Notionのステータス更新が完了しました。"

    # 3. 変更があった場合にaicreateブランチへ自動コミット＆プッシュを実行
    - name: Commit and Push Changes to Repository
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Gemini-Full-Auto-Bot"
        
        # aicreateブランチに切り替え（ローカル・リモートになければ新規作成）
        if git show-ref --verify --quiet refs/remotes/origin/aicreate; then
          git checkout aicreate
        else
          git checkout -b aicreate
        fi
        
        if [ -n "$(git status --porcelain)" ]; then
          git add src/
          git commit -m "feat: Notionの仕様・要件を解析してJavaコードを自動生成（複数ファイル対応）"
          git push -u origin aicreate
          echo "Gitリポジトリ（aicreateブランチ）への自動コミットおよびプッシュが完了しました！"
        else
          echo "生成コードに未変更、または更新が不要なためスキップします。"
        fi
