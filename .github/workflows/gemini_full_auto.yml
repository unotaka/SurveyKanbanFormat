name: Gemini Full Auto Developer

on:
  workflow_dispatch: # GitHubのウェブ画面から1クリックで手動実行を可能にします
  # もし1時間ごとにNotionを監視させたい場合は、以下のコメントアウトを外して有効化してください
  # schedule:
  #   - cron: '0 * * * *'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  full-auto-dev:
    runs-on: ubuntu-latest

    steps:
    # 1. リポジトリのソースコードを取得（チェックアウト）
    - name: Checkout Repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0 # すべてのブランチ履歴を取得します

    # 2. Notion APIの実行、Gemini APIによるコード生成、Notionの更新
    - name: Run Auto Generation and Move Kanban
      env:
        NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
        NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        NOTION_RULES_PAGE_ID: ${{ secrets.NOTION_RULES_PAGE_ID }} # 共通ルールページのID
        GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      run: |
        echo "=== 0. Notionから共通のソース生成ルールを取得中 ==="
        # ルールページのブロック情報を取得してテキストに結合
        RULES_RES=$(curl -s -X GET "https://api.notion.com/v1/blocks/${NOTION_RULES_PAGE_ID}/children" \
          -H "Authorization: Bearer ${NOTION_TOKEN}" \
          -H "Notion-Version: 2022-06-28")
        
        # 箇条書きや段落のテキストを抽出して1つの変数にまとめる
        GLOBAL_RULES=$(echo "$RULES_RES" | jq -r '.results[].paragraph.rich_text[0].plain_text // .results[].bulleted_list_item.rich_text[0].plain_text // empty' | tr '\n' ' ')
        echo "取得した共通ルール: $GLOBAL_RULES"

        echo "=== 0-2. Git内の既存のJavaファイル構造をスキャン中 ==="
        # プロジェクト内の全Javaファイル構造を取得してリスト化
        if [ -d "src" ]; then
          EXISTING_STRUCTURE=$(find src -name "*.java" | sort)
        else
          EXISTING_STRUCTURE="（既存のソースコードはまだありません）"
        fi

        echo "=== 1. Notionデータベースから『Claude生成待ち』の全タスクを検索中 ==="
        NOTION_RES=$(curl -s -X POST "https://api.notion.com/v1/databases/${NOTION_DATABASE_ID}/query" \
          -H "Authorization: Bearer ${NOTION_TOKEN}" \
          -H "Notion-Version: 2022-06-28" \
          -H "Content-Type: application/json" \
          -d '{
            "filter": {
              "property": "ステータス",
              "status": {
                "equals": "Claude生成待ち"
              }
            }
          }')

        # 該当するすべてのタスクのインデックス数を取得
        TASK_COUNT=$(echo "$NOTION_RES" | jq '.results | length')
        
        if [ "$TASK_COUNT" -eq 0 ]; then
          echo "「Claude生成待ち」のタスクは見つかりませんでした。処理を終了します。"
          exit 0
        fi

        echo "発見されたタスク数: ${TASK_COUNT}件。順次処理を開始します。"

        # 各タスクをループ処理
        for ((i=0; i<TASK_COUNT; i++)); do
          PAGE_ID=$(echo "$NOTION_RES" | jq -r ".results[$i].id")
          TASK_TITLE=$(echo "$NOTION_RES" | jq -r ".results[$i].properties[\"名前\"].title[0].text.content")
          
          echo "--------------------------------------------------"
          echo "[$((i+1))/${TASK_COUNT}] 処理中: $TASK_TITLE (PageID: $PAGE_ID)"
          echo "--------------------------------------------------"

          # Notionの「仕様・要件」プロパティ（リッチテキスト）を取得
          REQUIREMENTS=$(echo "$NOTION_RES" | jq -r ".results[$i].properties[\"仕様・要件\"].rich_text[0].text.content // empty")
          echo "=== 取得した仕様・要件 ==="
          echo "$REQUIREMENTS"

          echo "=== 2. パッケージプロパティとクラス名プロパティの取得 ==="
          # Notionの独立したプロパティ（パッケージ、クラス名）から値を取得
          PKG_NAME=$(echo "$NOTION_RES" | jq -r ".results[$i].properties[\"パッケージ\"].rich_text[0].text.content // empty")
          CLASS_NAME=$(echo "$NOTION_RES" | jq -r ".results[$i].properties[\"クラス名\"].rich_text[0].text.content // empty")

          # もしプロパティが空なら、従来の仕様・要件テキスト内からの抽出も試みる（互換性担保）
          if [ -z "$PKG_NAME" ]; then
            PKG_NAME=$(echo "$REQUIREMENTS" | grep -E 'パッケージ[：:]' | sed -E 's/.*パッケージ[：:][[:space:]]*([a-zA-Z0-9._]+).*/\1/' | head -n 1)
          fi
          if [ -z "$CLASS_NAME" ]; then
            CLASS_NAME=$(echo "$REQUIREMENTS" | grep -E 'クラス名[：:]' | sed -E 's/.*クラス名[：:][[:space:]]*([a-zA-Z0-9._]+).*/\1/' | head -n 1)
          fi

          echo "使用するパッケージ名: $PKG_NAME"
          echo "使用するクラス名: $CLASS_NAME"

          echo "=== 2-2. 関連する既存ソースコードの抽出中 ==="
          RELATED_CODE=""
          if [ -n "$PKG_NAME" ]; then
            # ドット区切りのパッケージ名をパス形式に変換 (例: com.example -> com/example)
            PKG_PATH=$(echo "$PKG_NAME" | tr '.' '/')
            
            # 関連する同一パッケージ配下、または親パッケージに属する既存ファイルを探索
            # ここでは src/main/java 配下の該当パッケージ内の既存Javaファイルの中身を結合
            TARGET_DIR="src/main/java/$PKG_PATH"
            if [ -d "$TARGET_DIR" ]; then
              echo "対象ディレクトリを発見: $TARGET_DIR 配下のソースをコンテキストに含めます"
              for f in $(find "$TARGET_DIR" -name "*.java"); do
                RELATED_CODE="${RELATED_CODE}\n\n--- 既存ファイル: $f ---\n$(cat "$f")"
              done
            fi

            # 共通で使われそうな exception や dto などのディレクトリがあれば、それらも自動検知して追加
            BASE_DIR="src/main/java/$(echo "$PKG_NAME" | cut -d'.' -f1-3 | tr '.' '/')"
            if [ -d "$BASE_DIR" ] && [ "$BASE_DIR" != "$TARGET_DIR" ]; then
              for f in $(find "$BASE_DIR" -maxdepth 3 -name "*Exception.java" -o -name "*Dto.java" 2>/dev/null); do
                RELATED_CODE="${RELATED_CODE}\n\n--- 既存ファイル（共通部品）: $f ---\n$(cat "$f")"
              done
            fi
          fi

          if [ -z "$RELATED_CODE" ]; then
            RELATED_CODE="（関連する既存ソースコードは検出されませんでした）"
          fi

          echo "=== 3. Gemini APIにリクエストしてJavaコードを作成中 ==="
          PROMPT="以下の【共通ルール】、現在リポジトリ内にある【既存のソースコード・ファイル構造】、および個別要件に基づき、Javaのソースコードを出力してください。"
          PROMPT="${PROMPT}\\n既存のクラス、DTO、インターフェース、例外クラス等で再利用可能なものがある場合は、新しく作らずに必ずそれらを再利用（インポート等）して一貫性のあるコードを構築してください。"
          
          if [ -n "$GLOBAL_RULES" ]; then
            PROMPT="${PROMPT}\\n\\n【共通ルール（最優先遵守）】\\n$GLOBAL_RULES"
          fi
          
          PROMPT="${PROMPT}\\n\\n【既存のプロジェクトファイル構造（全体）】\\n$EXISTING_STRUCTURE"
          PROMPT="${PROMPT}\\n\\n【生成に関連する既存のソースコード（中身）】\\n$RELATED_CODE"

          if [ -n "$PKG_NAME" ]; then
            PROMPT="${PROMPT}\\n\\n- 指定デフォルトパッケージ名: $PKG_NAME"
          fi
          if [ -n "$CLASS_NAME" ]; then
            PROMPT="${PROMPT}\\n- メインとなる指定クラス名: $CLASS_NAME"
          fi

          PROMPT="${PROMPT}\\n\\n【タスク内容】\\n$TASK_TITLE\\n\\n【詳細な仕様・要件】\\n$REQUIREMENTS"
          PROMPT="${PROMPT}\\n\\n※【重要・出力フォーマットの厳守】"
          PROMPT="${PROMPT}\\n複数のファイルを出力する場合は、後からスクリプトで分割できるように、必ず以下の形式でファイルごとに区切って出力してください。解説文や挨拶は一切含めないでください。"
          PROMPT="${PROMPT}\\n"
          PROMPT="${PROMPT}\\n--- FILE: src/main/java/path/to/ClassName.java ---"
          PROMPT="${PROMPT}\\npackage path.to;"
          PROMPT="${PROMPT}\\npublic class ClassName {"
          PROMPT="${PROMPT}\\n    ... "
          PROMPT="${PROMPT}\\n}"
          PROMPT="${PROMPT}\\n--- END FILE ---"
          PROMPT="${PROMPT}\\n"
          PROMPT="${PROMPT}\\n1つのファイルしかない場合でも、必ず上記の \`--- FILE: パス ---\` と \`--- END FILE ---\` の行で囲んで出力してください。"

          PAYLOAD=$(jq -n \
            --arg prompt "$PROMPT" \
            '{
              contents: [{parts: [{text: $prompt}]}]
            }')

          GEMINI_RES=$(curl -s -X POST "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")

          JAVA_CODE=$(echo "$GEMINI_RES" | jq -r '.candidates[0].content.parts[0].text // empty')

          if [ -z "$JAVA_CODE" ] || [ "$JAVA_CODE" = "null" ]; then
            echo "警告: Gemini APIからのレスポンス解析に失敗したため、このタスクをスキップします。"
            echo "$GEMINI_RES"
            continue
          fi

          echo "=== 4. 複数ファイルの解析と書き出し ==="
          GENERATED_FILES_LIST=$(mktemp)
          
          echo "$JAVA_CODE" | awk -v list_file="$GENERATED_FILES_LIST" '
            /^--- FILE: .* ---$/ {
              match($0, /--- FILE: (.*) ---/, arr);
              filepath = arr[1];
              
              # filepath が空でなく、空白以外を含む場合のみ処理する
              if (filepath != "" && filepath ~ /[^[:space:]]/) {
                print filepath >> list_file;
                dirpath = filepath;
                sub(/\/[^\/]+$/, "", dirpath);
                system("mkdir -p \"" dirpath "\"");
                print "書き出し中: " filepath;
                is_writing = 1;
              } else {
                is_writing = 0;
              }
              next;
            }
            /^--- END FILE ---$/ {
              is_writing = 0;
              if (filepath != "") {
                close(filepath);
              }
              next;
            }
            { 
              if (is_writing && filepath != "") {
                print $0 > filepath;
              } 
            }
          '

          # フォールバック処理
          if [ ! -s "$GENERATED_FILES_LIST" ]; then
            echo "警告: 指定フォーマットでのパースに失敗したかファイル名が空のため、単一ファイルとしてフォールバック処理を行います。"
            if [ -n "$PKG_NAME" ]; then DIR_PATH="src/main/java/$(echo "$PKG_NAME" | tr '.' '/')"; else DIR_PATH="src/main/java"; fi
            if [ -n "$CLASS_NAME" ]; then FILE_NAME="${CLASS_NAME}.java"; else FILE_NAME="GeneratedService_$i.java"; fi
            mkdir -p "$DIR_PATH"
            echo "$JAVA_CODE" > "${DIR_PATH}/${FILE_NAME}"
            echo "${DIR_PATH}/${FILE_NAME}" > "$GENERATED_FILES_LIST"
          fi

          echo "=== 5. 未定義だった場合のパッケージ・クラス名の自動推定 ==="
          # プロパティが空だった場合に、生成コードから自動抽出して補完するロジック
          if [ -z "$PKG_NAME" ] || [ -z "$CLASS_NAME" ]; then
            FIRST_FILE=$(head -n 1 "$GENERATED_FILES_LIST")
            
            if [ -z "$PKG_NAME" ]; then
              PKG_NAME=$(grep -E '^[[:space:]]*package[[:space:]]+' "$FIRST_FILE" | sed -E 's/^[[:space:]]*package[[:space:]]+([^;[:space:]]+);.*/\1/' | head -n 1)
              echo "AIコードからパッケージ名を自動抽出しました: $PKG_NAME"
            fi
            if [ -z "$CLASS_NAME" ]; then
              CLASS_NAME=$(grep -E 'public[[:space:]]+(class|interface|enum|record)[[:space:]]+' "$FIRST_FILE" | sed -E 's/.*public[[:space:]]+(class|interface|enum|record)[[:space:]]+([^{[:space:]]+).*/\2/' | head -n 1)
              echo "AIコードからクラス名を自動抽出しました: $CLASS_NAME"
            fi
          fi

          echo "=== 6. Notionのメインタスクを更新（各プロパティに格納） ==="
          # ステータスを『Git格納済み』にし、パッケージとクラス名プロパティに値を保存
          curl -s -X PATCH "https://api.notion.com/v1/pages/${PAGE_ID}" \
            -H "Authorization: Bearer ${NOTION_TOKEN}" \
            -H "Notion-Version: 2022-06-28" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg pkg "$PKG_NAME" \
              --arg cls "$CLASS_NAME" \
              '{
                properties: {
                  "ステータス": { status: { name: "Git格納済み" } },
                  "パッケージ": { rich_text: [{ text: { content: $pkg } }] },
                  "クラス名": { rich_text: [{ text: { content: $cls } }] }
                }
              }')" > /dev/null

          echo "=== 7. 複数ソース生成時の個別かんばんカード起票（タイトル複製＋連番） ==="
          FILE_COUNT=$(wc -l < "$GENERATED_FILES_LIST")

          if [ "$FILE_COUNT" -gt 1 ]; then
            seq_num=1
            while IFS= read -r f_path; do
              f_name=$(basename "$f_path")
              f_pkg=$(grep -E '^[[:space:]]*package[[:space:]]+' "$f_path" | sed -E 's/^[[:space:]]*package[[:space:]]+([^;[:space:]]+);.*/\1/' | head -n 1)
              f_class=$(grep -E 'public[[:space:]]+(class|interface|enum|record)[[:space:]]+' "$f_path" | sed -E 's/.*public[[:space:]]+(class|interface|enum|record)[[:space:]]+([^{[:space:]]+).*/\2/' | head -n 1)
              
              f_req="※「${TASK_TITLE}」の生成処理により分割作成されたソースファイルです。\nパス: ${f_path}"
              
              # 元のタスク名を複製し、末尾に連番とファイル名を設定
              # 例: 「ユーザー登録機能の作成 (1) User.java」
              child_title="${TASK_TITLE} (${seq_num}/${FILE_COUNT}) ${f_name}"
              
              echo "個別カードを作成中: $child_title"
              
              curl -s -X POST "https://api.notion.com/v1/pages" \
                -H "Authorization: Bearer ${NOTION_TOKEN}" \
                -H "Notion-Version: 2022-06-28" \
                -H "Content-Type: application/json" \
                -d "$(jq -n \
                  --arg db_id "${NOTION_DATABASE_ID}" \
                  --arg title "$child_title" \
                  --arg req "$f_req" \
                  --arg pkg "$f_pkg" \
                  --arg cls "$f_class" \
                  '{
                    parent: { database_id: $db_id },
                    properties: {
                      "名前": { title: [{ text: { content: $title } }] },
                      "ステータス": { status: { name: "Git格納済み" } },
                      "パッケージ": { rich_text: [{ text: { content: $pkg } }] },
                      "クラス名": { rich_text: [{ text: { content: $cls } }] },
                      "仕様・要件": { rich_text: [{ text: { content: $req } }] }
                    }
                  }')" > /dev/null
              
              # 連番インクリメント
              seq_num=$((seq_num + 1))
            done < "$GENERATED_FILES_LIST"
          fi
          
          rm -f "$GENERATED_FILES_LIST"
        done

    # 3. 全てのタスク処理完了後、変更があった場合にaicreateブランチへプッシュ
    - name: Commit and Push Changes to Repository
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Gemini-Full-Auto-Bot"
        
        if git show-ref --verify --quiet refs/remotes/origin/aicreate; then
          git checkout aicreate
        else
          git checkout -b aicreate
        fi
        
        if [ -n "$(git status --porcelain)" ]; then
          git add src/
          git commit -m "feat: Notionプロパティと連動してJavaソースコードを自動生成"
          git push -u origin aicreate
          echo "Gitリポジトリ（aicreateブランチ）への自動コミットおよびプッシュが完了しました！"
        else
          echo "生成コードに未変更、または更新が不要なためスキップします。"
        fi
