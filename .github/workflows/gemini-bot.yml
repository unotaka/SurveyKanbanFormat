name: Gemini Automated Developer

on:
  repository_dispatch:
    types: [notion_trigger] # NotionのWebhookから発火

jobs:
  develop:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm install -g pnpm && pnpm install

      # 1. 自動でGitブランチ作成
      - name: Create Branch
        run: |
          git config --global user.name "Gemini Bot"
          git config --global user.email "gemini-bot@example.com"
          git checkout -b feature/${{ github.event.client_payload.task_id }}

      # 2. Geminiによるコード自動生成
      - name: Run Gemini Coder
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          NOTION_INSTRUCTION: ${{ github.event.client_payload.instruction }}
        run: node scripts/gemini-coder.js

      # 3. テスト実行＆エラー時の自動リトライ（最大3回）
      - name: Execute and Self-Heal Tests
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          n=0
          until [ $n -ge 3 ]
          do
            pnpm test && break
            n=$[$n+1]
            echo "❌ テスト失敗。Geminiにエラーログを送信して自動修正を試みます（試行 $n 回目）"
            # ここでエラーログをGeminiに渡すスクリプトを叩く（仕組みはStep3と同様）
          done

      # 4. プルリクエストの自動作成
      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git add .
          git commit -m "feat: Geminiによるコード・テスト自動生成"
          git push origin feature/${{ github.event.client_payload.task_id }}
          gh pr create --title "【Gemini自動生成】${{ github.event.client_payload.task_title }}" --body "Notionからの自動連携PRです。" --base main --head feature/${{ github.event.client_payload.task_id }}
