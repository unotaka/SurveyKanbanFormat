name: AI Notion Monitor & Developer Loop

on:
  #schedule:
  #  # 15分ごとに自動起動 (UTC基準。毎時 0, 15, 30, 45分に実行)
  #  - cron: '*/15 * * * *'
  workflow_dispatch: # GitHub画面からいつでも手動で即座に実行できるボタンを設置

# ワークフローがリポジトリへの書き込みやPR作成を行えるよう権限を定義
permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  ai-development-flow:
    runs-on: ubuntu-latest

    steps:
      # 1. コードのチェックアウト
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # すべての分岐履歴を取得

      # 2. Node.js 環境のセットアップ
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 3. パッケージマネージャー(pnpm)のインストールと依存関係の解決
      - name: Install Dependencies
        run: |
          npm install -g pnpm
          
          # 💡 package.json の有無に関わらず、AIの実行に必要なライブラリを直接インストール
          npm install @google/genai
          
          # もし既存の package.json がある場合は、他の依存関係も通常通りインストール
          if [ -f "package.json" ]; then
            pnpm install
          else
            echo "🎵 package.json が直下にないため、個別インストールのみで進行します"
          fi

      # 4. Notionに「Claude生成待ち」のタスクがないかポーリング（チェック）
      - name: Check Notion Database
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: node scripts/cron-scheduler.js

      # 5. 【条件分岐】タスクがある場合のみ、専用のGitブランチを作成
      - name: Create Feature Branch
        if: env.TASK_ID != ''
        run: |
          # Gitのコミット用ユーザー情報を設定
          git config --global user.name "Gemini Developer Bot"
          git config --global user.email "gemini-bot@yourdomain.local"
          
          # 新しい開発用ブランチを作成して切り替え
          git checkout -b feature/$TASK_ID

      # 6. 【条件分岐】Geminiによるソースコード・テストコードの自動生成
      - name: Run Gemini Coder
        if: env.TASK_ID != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          # 💡 環境変数ではなく、直前のステップが生成した task_info.json を直接読み込ませます
          node scripts/gemini-coder.js

      # 7. 【条件分岐】自動テストの実行 ＆ エラー時の自律修正ループ（最大3回リトライ）
      - name: Execute Tests and Self-Healing Loop
        if: env.TASK_ID != ''
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          attempt=0
          max_attempts=3
          success=false

          until [ $attempt -ge $max_attempts ]
          do
            echo "🧪 テストを実行中... (試行 $(($attempt+1))/$max_attempts)"
            
            # あなたのプロジェクトのテストコマンド（例: pnpm test）を実行
            if pnpm test; then
              echo "✅ テストが正常にパスしました！"
              success=true
              break
            fi

            attempt=$(($attempt+1))
            if [ $attempt -lt $max_attempts ]; then
              echo "❌ テストが失敗しました。Geminiにエラーログを送信してコードを自動修正します..."
              # (任意実装) 必要に応じてここでエラーログをパースしてGeminiに投げるスクリプトを実行
              # node scripts/gemini-fixer.js
            fi
          done

          if [ "$success" = false ]; then
            echo "🚨 最大リトライ回数に達しましたが、テストをパスできませんでした。処理を中断します。"
            exit 1
          fi

      # 8. 【条件分岐】成果物をプッシュし、GitHub上でプルリクエスト(PR)を自動作成
      - name: Push Code and Create Pull Request
        if: env.TASK_ID != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }} # GitHub標準のトークンを使用
        run: |
          # 変更をすべてステージングしてコミット
          git add .
          git commit -m "feat($TASK_ID): Geminiによるコードおよびテストの自動生成（テスト通過済み）"
          
          # リモートリポジトリへ強制プッシュ
          git push -u origin feature/$TASK_ID --force
          
          # GitHub CLI を使ってプルリクエストを作成
          gh pr create \
            --title "【Gemini自動生成】$TASK_ID" \
            --body "Notionの「Claude生成待ち」ステータスから自動起票されたPRです。テストは正常に通過しています。目視レビューをお願いします。" \
            --base main \
            --head feature/$TASK_ID

      # 9. 【条件分岐】すべての工程が完了したら、Notionのステータスを「Git格納済み」に更新
      - name: Update Notion Status to Git Stored
        if: env.TASK_ID != ''
        run: |
          # 💡 JSONファイルから PAGE_ID をノードのワンライナーで安全に抽出
          PAGE_ID=$(node -e "console.log(require('./task_info.json').PAGE_ID)")
          
          echo "📝 Notionのタスク（ページID: $PAGE_ID）を『Git格納済み』に更新中..."
          
          curl -X PATCH "https://api.notion.com/v1/pages/$PAGE_ID" \
            -H "Authorization: Bearer ${{ secrets.NOTION_TOKEN }}" \
            -H "Content-Type: application/json" \
            -H "Notion-Version: 2022-06-28" \
            --data '{
              "properties": {
                "ステータス": {
                  "status": {
                    "name": "Git格納済み"
                  }
                }
              }
            }'
          
          echo "🎉 すべての自動化プロセスが正常に完了しました！"
